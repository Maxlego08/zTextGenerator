# Documentation: https://ztextgenerator.groupez.dev/configurations/texts

inventory-size: 54
# The inventory name will be transformed using the font of your pack plugin.
# For example, with ItemsAdder, it will become:generic_dark_full:
inventory-name: "generic_dark_full"
# The offset that will be applied before the inventory name.
# For example, with ItemsAdder, it will become:offset_-48:
start-offset: -48
# The offset that will be applied after the inventory name.
# For example, with ItemsAdder, it will become:offset_-168:
end-offset: -168

